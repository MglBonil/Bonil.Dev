
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Writer — PaperMod</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #2a2a2a;
    --border-soft: #1e1e1e;
    --text: #e8e6e0;
    --text-muted: #666;
    --text-dim: #444;
    --accent: #c8a96e;
    --accent-dim: rgba(200, 169, 110, 0.12);
    --green: #6ea88a;
    --red: #c86e6e;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Lora', Georgia, serif;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 44px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .sep { width: 1px; height: 20px; background: var(--border); }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
    flex-wrap: wrap;
  }

  .tb-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--accent-dim); color: var(--accent); }
  .tb-btn svg { display: block; }

  .tb-group { display: flex; gap: 1px; }

  .actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 4px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .85; }

  .btn-ghost {
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── FRONT MATTER PANEL ── */
  .fm-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .fm-field { display: flex; flex-direction: column; gap: 3px; }
  .fm-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }

  .fm-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  .fm-input:focus { border-color: var(--accent); }
  .fm-input::placeholder { color: var(--text-dim); }

  .fm-tags-wrap { position: relative; }

  .fm-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }
  .fm-toggle input { display: none; }
  .toggle-pill {
    width: 30px; height: 16px;
    background: var(--border);
    border-radius: 8px;
    position: relative;
    transition: background .2s;
  }
  .toggle-pill::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: var(--text-muted);
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform .2s, background .2s;
  }
  .fm-toggle input:checked ~ .toggle-pill { background: var(--accent-dim); }
  .fm-toggle input:checked ~ .toggle-pill::after { transform: translateX(14px); background: var(--accent); }

  /* ── MAIN EDITOR AREA ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* EDITOR PANE */
  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    border-right: 1px solid var(--border);
  }

  .pane-label {
    padding: 6px 16px;
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border-bottom: 1px solid var(--border-soft);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #editor {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.75;
    padding: 24px 28px;
    tab-size: 2;
    overflow-y: auto;
    caret-color: var(--accent);
  }
  #editor::selection { background: rgba(200,169,110,.2); }

  /* PREVIEW PANE */
  .preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #preview {
    flex: 1;
    overflow-y: auto;
    padding: 28px 40px;
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.85;
    color: var(--text);
  }

  /* PaperMod-like preview styles */
  #preview h1,#preview h2,#preview h3,#preview h4 {
    font-family: var(--serif);
    color: var(--text);
    margin: 1.6em 0 .6em;
    line-height: 1.3;
    font-weight: 600;
  }
  #preview h1 { font-size: 2em; margin-top: 0; padding-bottom: .4em; border-bottom: 1px solid var(--border); }
  #preview h2 { font-size: 1.45em; padding-bottom: .3em; border-bottom: 1px solid var(--border-soft); }
  #preview h3 { font-size: 1.2em; }
  #preview h4 { font-size: 1em; color: var(--text-muted); }
  #preview p { margin: .8em 0; }
  #preview a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  #preview strong { font-weight: 600; color: #fff; }
  #preview em { font-style: italic; }
  #preview code {
    font-family: var(--mono);
    font-size: .82em;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent);
  }
  #preview pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 1.2em 0;
  }
  #preview pre code { background: none; border: none; padding: 0; color: var(--text); font-size: .88em; }
  #preview blockquote {
    border-left: 3px solid var(--accent);
    margin: 1.2em 0;
    padding: .4em 0 .4em 20px;
    color: var(--text-muted);
    font-style: italic;
  }
  #preview ul,#preview ol { padding-left: 1.6em; margin: .8em 0; }
  #preview li { margin: .3em 0; }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
  #preview img { max-width: 100%; border-radius: 6px; border: 1px solid var(--border); }
  #preview table { border-collapse: collapse; width: 100%; margin: 1em 0; font-family: var(--mono); font-size: .87em; }
  #preview th { background: var(--surface); color: var(--accent); font-weight: 600; }
  #preview th,#preview td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  #preview tr:nth-child(even) { background: rgba(255,255,255,.02); }

  /* FRONT MATTER badge in preview */
  .fm-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }
  .fm-badge strong { color: var(--accent); }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 4px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .status-bar span { display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    width: min(560px, 90vw);
    max-height: 80vh;
    overflow-y: auto;
    transform: translateY(8px);
    transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h3 { font-family: var(--serif); font-size: 16px; margin-bottom: 16px; color: var(--accent); }
  .modal pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    font-size: 11.5px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 50vh;
    overflow-y: auto;
    color: var(--text);
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--accent); color: #0f0f0f;
    padding: 8px 18px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <span class="logo">✦ PaperMod Writer</span>
  <div class="sep"></div>

  <div class="toolbar">
    <!-- Headings -->
    <div class="tb-group">
      <button class="tb-btn" onclick="wrap('# ','',true)" title="H1">H1</button>
      <button class="tb-btn" onclick="wrap('## ','',true)" title="H2">H2</button>
      <button class="tb-btn" onclick="wrap('### ','',true)" title="H3">H3</button>
    </div>
    <div class="sep"></div>
    <!-- Inline -->
    <div class="tb-group">
      <button class="tb-btn" onclick="wrap('**','**')" title="Negrito"><b>B</b></button>
      <button class="tb-btn" onclick="wrap('*','*')" title="Itálico"><i>I</i></button>
      <button class="tb-btn" onclick="wrap('~~','~~')" title="Riscado">~~</button>
      <button class="tb-btn" onclick="wrap('`','`')" title="Código">`</button>
    </div>
    <div class="sep"></div>
    <!-- Blocks -->
    <div class="tb-group">
      <button class="tb-btn" onclick="insertBlock('> ')" title="Citação">❝</button>
      <button class="tb-btn" onclick="insertCodeBlock()" title="Bloco de código">```</button>
      <button class="tb-btn" onclick="insertBlock('---\n')" title="Divisor">—</button>
    </div>
    <div class="sep"></div>
    <!-- Lists -->
    <div class="tb-group">
      <button class="tb-btn" onclick="insertBlock('- ')" title="Lista">• List</button>
      <button class="tb-btn" onclick="insertBlock('1. ')" title="Lista numerada">1. List</button>
      <button class="tb-btn" onclick="insertBlock('- [ ] ')" title="Checklist">☐</button>
    </div>
    <div class="sep"></div>
    <!-- Media -->
    <div class="tb-group">
      <button class="tb-btn" onclick="insertLink()" title="Link">🔗</button>
      <button class="tb-btn" onclick="insertImage()" title="Imagem">🖼</button>
      <button class="tb-btn" onclick="insertTable()" title="Tabela">⊞</button>
    </div>
    <div class="sep"></div>
    <!-- PaperMod -->
    <div class="tb-group">
      <button class="tb-btn" onclick="insertShortcode('callout')" title="Callout PaperMod">📌</button>

    </div>
  </div>

  <div class="actions">
    <button class="btn-ghost" onclick="openModal()">Exportar .md</button>
    <button class="btn-primary" onclick="copyFull()">Copiar tudo</button>
  </div>
</header>

<!-- FRONT MATTER -->
<div class="fm-bar">
  <div class="fm-field">
    <label class="fm-label">Título</label>
    <input class="fm-input" id="fm-title" placeholder="Meu post incrível" oninput="updatePreview()">
  </div>
  <div class="fm-field">
    <label class="fm-label">Data</label>
    <input class="fm-input" id="fm-date" type="date" oninput="updatePreview()">
  </div>
  <div class="fm-field">
    <label class="fm-label">Tags (vírgula)</label>
    <input class="fm-input" id="fm-tags" placeholder="go, tutorial, backend" oninput="updatePreview()">
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <label class="fm-toggle">
      <input type="checkbox" id="fm-draft" onchange="updatePreview()">
      <span class="toggle-pill"></span>
      Draft
    </label>

  </div>
</div>

<!-- WORKSPACE -->
<div class="workspace">
  <div class="editor-pane">
    <div class="pane-label">
      <span>Editor Markdown</span>
      <span id="char-count" style="font-size:9px;color:var(--text-dim)">0 chars</span>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Escreva seu post aqui...

Dicas rápidas:
# Título grande
## Subtítulo
**negrito**, *itálico*, `código`
> citação
- item de lista" oninput="updatePreview(); updateCount()"></textarea>
  </div>

  <div class="preview-pane">
    <div class="pane-label">
      <span>Preview — estilo PaperMod</span>
    </div>
    <div id="preview"></div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <span><span class="status-dot"></span> Pronto</span>
  <span id="word-count">0 palavras</span>
  <span id="read-time">~0 min leitura</span>
  <span style="margin-left:auto;color:var(--text-dim)">PaperMod Writer · GitHub Pages</span>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3>Arquivo Markdown gerado</h3>
    <pre id="modal-content"></pre>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Fechar</button>
      <button class="btn-ghost" onclick="copyModal()">Copiar</button>
      <button class="btn-primary" onclick="downloadMd()">⬇ Baixar .md</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- marked.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
// ── CONFIG MARKED ──
marked.setOptions({
  gfm: true,
  breaks: true,
});

// ── FRONT MATTER ──
function getFrontMatter() {
  const title = document.getElementById('fm-title').value.trim();
  const date  = document.getElementById('fm-date').value;
  const tags  = document.getElementById('fm-tags').value.trim();
  const draft = document.getElementById('fm-draft').checked;


  const tagList = tags ? tags.split(',').map(t => `"${t.trim()}"`).join(', ') : '';

  let fm = '---\n';
  if (title) fm += `title: "${title}"\n`;
  if (date)  fm += `date: ${date}T00:00:00-03:00\n`;
  if (tags)  fm += `tags: [${tagList}]\n`;
  if (draft) fm += `draft: true\n`;

  fm += `showReadingTime: true\n`;
  fm += '---\n';
  return fm;
}

// ── PREVIEW ──
function updatePreview() {
  const raw = document.getElementById('editor').value;
  const title = document.getElementById('fm-title').value.trim();
  const date  = document.getElementById('fm-date').value;
  const tags  = document.getElementById('fm-tags').value.trim();
  const draft = document.getElementById('fm-draft').checked;

  let html = '';

  // Front matter badge
  html += '<div class="fm-badge"><code>---</code><br>';
  if (title) html += `<strong>title:</strong> "${title}"<br>`;
  if (date)  html += `<strong>date:</strong> ${date}<br>`;
  if (tags)  html += `<strong>tags:</strong> [${tags}]<br>`;
  if (draft) html += `<strong>draft:</strong> true<br>`;
  html += '<code>---</code></div>';

  html += marked.parse(raw || '*Seu conteúdo aparecerá aqui...*');

  document.getElementById('preview').innerHTML = html;
  updateCount();
}

// ── COUNTS ──
function updateCount() {
  const txt = document.getElementById('editor').value;
  const chars = txt.length;
  const words = txt.trim() ? txt.trim().split(/\s+/).length : 0;
  const mins  = Math.max(1, Math.round(words / 200));
  document.getElementById('char-count').textContent = chars + ' chars';
  document.getElementById('word-count').textContent = words + ' palavras';
  document.getElementById('read-time').textContent  = '~' + mins + ' min leitura';
}

// ── TOOLBAR HELPERS ──
function getEditor() { return document.getElementById('editor'); }

function wrap(before, after, linePrefix = false) {
  const el = getEditor();
  const s = el.selectionStart, e = el.selectionEnd;
  const sel = el.value.substring(s, e);

  let insert;
  if (linePrefix) {
    insert = before + (sel || 'Título');
  } else {
    insert = before + (sel || 'texto') + after;
  }

  el.setRangeText(insert, s, e, 'select');
  el.focus();
  updatePreview();
}

function insertBlock(prefix) {
  const el = getEditor();
  const pos = el.selectionStart;
  const val = el.value;
  const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
  const before = val.substring(0, lineStart);
  const after  = val.substring(lineStart);
  el.value = before + prefix + after;
  const newPos = lineStart + prefix.length;
  el.setSelectionRange(newPos, newPos);
  el.focus();
  updatePreview();
}

function insertCodeBlock() {
  const el = getEditor();
  const s = el.selectionStart, e = el.selectionEnd;
  const sel = el.value.substring(s, e);
  const insert = '```linguagem\n' + (sel || 'seu código aqui') + '\n```';
  el.setRangeText(insert, s, e, 'end');
  el.focus();
  updatePreview();
}

function insertLink() {
  const el = getEditor();
  const s = el.selectionStart, e = el.selectionEnd;
  const sel = el.value.substring(s, e) || 'texto do link';
  const url = prompt('URL:', 'https://');
  if (!url) return;
  el.setRangeText(`[${sel}](${url})`, s, e, 'end');
  el.focus();
  updatePreview();
}

function insertImage() {
  const alt = prompt('Texto alternativo:') || 'imagem';
  const url = prompt('URL da imagem:');
  if (!url) return;
  const el = getEditor();
  const pos = el.selectionEnd;
  el.setRangeText(`![${alt}](${url})`, pos, pos, 'end');
  el.focus();
  updatePreview();
}

function insertTable() {
  const el = getEditor();
  const pos = el.selectionEnd;
  const tbl = `\n| Coluna 1 | Coluna 2 | Coluna 3 |\n|----------|----------|----------|\n| Dado     | Dado     | Dado     |\n`;
  el.setRangeText(tbl, pos, pos, 'end');
  el.focus();
  updatePreview();
}

function insertShortcode(type) {
  const el = getEditor();
  const pos = el.selectionEnd;
  let code = '';
  if (type === 'callout') {
    code = `\n{{< callout type="info" >}}\nSua mensagem de destaque aqui.\n{{< /callout >}}\n`;
  }
  el.setRangeText(code, pos, pos, 'end');
  el.focus();
  updatePreview();
}

// ── FULL CONTENT ──
function getFullContent() {
  return getFrontMatter() + '\n' + document.getElementById('editor').value;
}

function copyFull() {
  navigator.clipboard.writeText(getFullContent()).then(() => showToast('Copiado!'));
}

// ── MODAL ──
function openModal() {
  document.getElementById('modal-content').textContent = getFullContent();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function copyModal() {
  navigator.clipboard.writeText(document.getElementById('modal-content').textContent)
    .then(() => showToast('Copiado!'));
}

function downloadMd() {
  const content = getFullContent();
  const title   = document.getElementById('fm-title').value.trim() || 'post';
  const slug    = title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '');
  const filename = slug || 'post';
  const blob = new Blob([content], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename + '.md';
  a.click();
  showToast('Baixando ' + filename + '.md');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── KEYBOARD SHORTCUTS ──
document.getElementById('editor').addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey)) {
    if (e.key === 'b') { e.preventDefault(); wrap('**','**'); }
    if (e.key === 'i') { e.preventDefault(); wrap('*','*'); }
    if (e.key === 'k') { e.preventDefault(); insertLink(); }
    if (e.key === 's') { e.preventDefault(); copyFull(); }
  }
  // Tab → 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target;
    const s = el.selectionStart;
    el.setRangeText('  ', s, s, 'end');
    updatePreview();
  }
});

// ── INIT ──
document.getElementById('fm-date').value = new Date().toISOString().split('T')[0];
updatePreview();
</script>
