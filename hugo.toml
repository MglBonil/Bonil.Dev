baseURL = "https://mglbonil.github.io/Bonil.Dev/"
title = "Bonil.Dev"
theme = "hextra"
defaultContentLanguage = "pt"

enableRobotsTXT = true
enableGitInfo = false
hasCJKLanguage = false

[outputs]
  home = ["html"]
  page = ["html"]
  section = ["html", "rss"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[menu]

  [[menu.main]]
    identifier = "Sobre"
    name = "Sobre"
    pageRef = "/sobre"
    weight = 2


  [[menu.main]]
    identifier = "sobre"
    name = "Autor"
    url = "https://mglbonil.github.io/portifolio/"
    weight = 3
    [menu.main.params]
      icon = "github"

  [[menu.main]]
    identifier = "search"
    name = "Buscar"
    weight = 5
    [menu.main.params]
      type = "search"

  [[menu.main]]
    name = "Tema"
    weight = 8
    [menu.main.params]
      type = "theme-toggle"

  [[menu.main]]
    name = "RSS"
    url = "/index.xml"
    weight = 9
    [menu.main.params]
      icon = "rss"

[params]
  description = "Pensamentos, projetos e descobertas."

  [params.navbar]
    displayTitle = true
    displayLogo = false
    width = "wide"

  [params.theme]
    default = "system"
    displayToggle = true

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true
    width = "normal"

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"
      tokenize = "forward"

  [params.blog]
    [params.blog.list]
      displayTags = true
      sortBy = "date"
      sortOrder = "desc"
      pagerSize = 10

  [params.toc]
    displayTags = true

  [params.highlight]
    [params.highlight.copy]
      enable = true
      display = "hover"

  [params.page]
    width = "normal"

  [params.imageZoom]
    enable = true

  [params.comments]
    enable = false

  displayUpdatedDate = true
  dateFormat = "January 2, 2006"
